# Deployment declaration maintained with the source repository.
# After completing DEPLOYMENT.md, copy this file into:
# tmprl-demo-cloud-registry/projects/demo/langgraph-temporal-demo.yaml
apiVersion: registry.tmprl-demo.cloud/v1alpha1
kind: DemoProject
metadata:
  name: langgraph-temporal-demo
spec:
  registry:
    title: Temporal and LangGraph Support Agent Comparison
    summary: >-
      Side-by-side music-store support agent comparing an original Temporal
      workflow, standalone LangGraph, and Temporal's LangGraph integration,
      including tool use, approval, retries, and recovery behavior.
    tags:
      - AI
      - Agents
      - LangGraph
      - Human-in-the-Loop
      - Comparison
    temporalSdks:
      - Python

  source:
    repo: https://github.com/temporal-sa/langgraph-temporal-demo

  builds:
    temporal:
      context: .
      dockerfile: docker/temporal.Dockerfile
    langgraph:
      context: .
      dockerfile: docker/langgraph.Dockerfile
    temporal-langgraph:
      context: .
      dockerfile: docker/backend.Dockerfile
    web:
      context: .
      dockerfile: docker/frontend.Dockerfile
    postgres:
      context: .
      dockerfile: docker/postgres.Dockerfile

  components:
    postgres:
      build: postgres
      replicas: 1
      ports:
        - name: db
          containerPort: 5432
          servicePort: 5432
      env:
        - name: POSTGRES_USER
          valueFrom:
            inputRef: secrets.database.POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            inputRef: secrets.database.POSTGRES_PASSWORD

    temporal-worker:
      build: temporal
      command: [python, worker.py]
      worker: true
      env:
        - name: TEMPORAL_TASK_QUEUE
          value: support-agent
        - name: LLM_PROVIDER
          value: anthropic
        - name: DB_URL
          valueFrom:
            inputRef: secrets.database.DB_URL
      secrets:
        - llm-credentials

    temporal-api:
      build: temporal
      temporalAccess: true
      command: [python, -m, uvicorn, api:app, --host, 0.0.0.0, --port, "8000"]
      ports:
        - name: http
          containerPort: 8000
          servicePort: 8000
      env:
        - name: TEMPORAL_TASK_QUEUE
          value: support-agent
        - name: DEMO_AUTH_REQUIRED
          value: "true"
        - name: DEMO_ACCESS_TOKEN
          valueFrom:
            inputRef: secrets.demo-access.DEMO_ACCESS_TOKEN

    langgraph-api:
      build: langgraph
      replicas: 1
      command: [python, -m, uvicorn, api:app, --host, 0.0.0.0, --port, "8001"]
      ports:
        - name: http
          containerPort: 8001
          servicePort: 8001
      env:
        - name: LLM_PROVIDER
          value: anthropic
        - name: DB_URL
          valueFrom:
            inputRef: secrets.database.DB_URL
        - name: DEMO_AUTH_REQUIRED
          value: "true"
        - name: DEMO_ACCESS_TOKEN
          valueFrom:
            inputRef: secrets.demo-access.DEMO_ACCESS_TOKEN
      secrets:
        - llm-credentials

    temporal-langgraph-worker:
      build: temporal-langgraph
      command: [python, worker.py]
      worker: true
      env:
        - name: LANGGRAPH_TEMPORAL_TASK_QUEUE
          value: support-agent-temporal-langgraph
        - name: LLM_PROVIDER
          value: anthropic
        - name: DB_URL
          valueFrom:
            inputRef: secrets.database.DB_URL
      secrets:
        - llm-credentials

    temporal-langgraph-api:
      build: temporal-langgraph
      temporalAccess: true
      command: [python, -m, uvicorn, api:app, --host, 0.0.0.0, --port, "8002"]
      ports:
        - name: http
          containerPort: 8002
          servicePort: 8002
      env:
        - name: PORT
          value: "8002"
        - name: LANGGRAPH_TEMPORAL_TASK_QUEUE
          value: support-agent-temporal-langgraph
        - name: CORS_ALLOW_ORIGINS
          value: https://langgraph-temporal-demo.tmprl-demo.cloud
        - name: DEMO_AUTH_REQUIRED
          value: "true"
        - name: DEMO_ACCESS_TOKEN
          valueFrom:
            inputRef: secrets.demo-access.DEMO_ACCESS_TOKEN

    web:
      build: web
      ports:
        - name: http
          containerPort: 8080
          servicePort: 80
      env:
        - name: WEB_PORT
          value: "8080"
        - name: DEFAULT_AGENT_BACKEND
          value: temporal-langgraph
        - name: TEMPORAL_BACKEND_URL
          value: /api/temporal
        - name: LANGGRAPH_BACKEND_URL
          value: /api/langgraph
        - name: TEMPORAL_LANGGRAPH_BACKEND_URL
          value: /api/temporal-langgraph

  secrets:
    llm-credentials:
      requiredProperties:
        - ANTHROPIC_API_KEY
    database:
      requiredProperties:
        - POSTGRES_USER
        - POSTGRES_PASSWORD
        - DB_URL
    demo-access:
      requiredProperties:
        - DEMO_ACCESS_TOKEN

  ingress:
    subdomain: langgraph-temporal-demo
    temporalAuthRequired: true

  smokeCheck:
    path: /healthz
    expectedStatus: 200
